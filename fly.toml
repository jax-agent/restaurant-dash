# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'restaurant-dash'
primary_region = 'ord'

[build]
  # Use --remote-only for Fly CI (avoids local Docker Hub hits)
  # Use local Podman via: DOCKER_HOST=unix:///run/podman/podman.sock flyctl deploy --local-only

[deploy]
  release_command = "/app/bin/migrate"
  wait_timeout = "5m"

[env]
  PHX_HOST = 'restaurant-dash.fly.dev'
  PORT = '8080'
  ECTO_IPV6 = 'true'
  PHX_SERVER = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 900

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
